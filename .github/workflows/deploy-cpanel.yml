name: Deploy to Servicio Gudiño

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build React (base /gestion/ → serviciogudino.com.mx)
        run: npm run build
        env:
          NODE_ENV: production
          VITE_BASE_PATH: /gestion/
          VITE_API_URL: https://serviciogudino.com.mx/gestion/backend-php
          VITE_APP_NAME: Servicio Gudiño
          VITE_THEME: demo
          VITE_LOGO_PATH: logo.png

      - name: Verificar build
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: dist no generado"
            exit 1
          fi
          echo "Build OK"
          ls -la dist/

      - name: Deploy React → /gestion/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_SG }}
          username: ${{ secrets.FTP_USERNAME_SG }}
          password: ${{ secrets.FTP_PASSWORD_SG }}
          port: 21
          local-dir: dist/
          server-dir: ./gestion/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
            **/backend-php/**
          security: loose
          timeout: 600000

      - name: Deploy Backend PHP → /gestion/backend-php/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_SG }}
          username: ${{ secrets.FTP_USERNAME_SG }}
          password: ${{ secrets.FTP_PASSWORD_SG }}
          port: 21
          local-dir: backend-php/
          server-dir: ./gestion/backend-php/
          dangerous-clean-slate: false
          exclude: |
            **/.git
            **/.github/**
            **/node_modules/**
            **/.DS_Store
            **/.env
            **/.env.local
            **/.env.example
          log-level: verbose
          security: loose
          timeout: 900000

      - name: Deploy backend .htaccess
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_SG }}
          username: ${{ secrets.FTP_USERNAME_SG }}
          password: ${{ secrets.FTP_PASSWORD_SG }}
          port: 21
          local-dir: backend-php/
          server-dir: ./gestion/backend-php/
          dangerous-clean-slate: false
          exclude: |
            **/*
            !**/.htaccess
          security: loose
          timeout: 300000

      - name: Deploy frontend .htaccess (React Router /gestion/)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_SG }}
          username: ${{ secrets.FTP_USERNAME_SG }}
          password: ${{ secrets.FTP_PASSWORD_SG }}
          port: 21
          local-dir: frontend-htaccess/
          server-dir: ./gestion/
          dangerous-clean-slate: false
          exclude: |
            **/*
            !**/.htaccess
          security: loose
          timeout: 300000

      - name: Deploy completado
        if: success()
        run: |
          echo "Deploy exitoso a serviciogudino.com.mx/gestion/"
          echo "Fecha: $(date)"

      - name: Deploy falló
        if: failure()
        run: echo "Error en el deploy — revisa los logs"
