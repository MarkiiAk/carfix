name: Deploy to Staging

# Se ejecuta en push a la rama staging o manualmente
on:
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout codigo
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: npm ci

      # 4. Compilar el proyecto React apuntando a /staging/
      - name: Build proyecto React (base /staging/)
        run: npm run build
        env:
          NODE_ENV: production
          VITE_BASE_PATH: /staging/
          VITE_API_URL: https://saggarage.com.mx/staging/backend-php

      # 5. Verificar que el build se creó correctamente
      - name: Verificar build
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: La carpeta dist no se genero"
            exit 1
          fi
          echo "Build generado correctamente"
          ls -la dist/

      # 6. Subir aplicación React a /staging/
      - name: Deploy aplicacion React a /staging/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_STAGING }}
          username: ${{ secrets.FTP_USERNAME_STAGING }}
          password: ${{ secrets.FTP_PASSWORD_STAGING }}
          port: 21

          local-dir: dist/
          server-dir: ${{ secrets.FTP_PATH_STAGING }}

          # NO limpiar para preservar archivos existentes (backend-php, .htaccess)
          dangerous-clean-slate: false

          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.vscode/**
            **/.DS_Store
            **/backend-php/**
            **/.claude/**
            **/memory/**

          security: strict
          timeout: 600000

      # 7. Subir Backend PHP a /staging/backend-php/
      - name: Deploy Backend PHP a /staging/backend-php/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_STAGING }}
          username: ${{ secrets.FTP_USERNAME_STAGING }}
          password: ${{ secrets.FTP_PASSWORD_STAGING }}
          port: 21

          local-dir: backend-php/
          server-dir: ${{ secrets.FTP_PATH_STAGING }}backend-php/

          # NO LIMPIAR — preserva el .env del servidor de staging
          dangerous-clean-slate: false

          exclude: |
            **/.git
            **/.github/**
            **/.gitignore
            **/node_modules/**
            **/.vscode/**
            **/.DS_Store
            **/.env
            **/.env.local
            **/.env.example
            **/INSTALACION-BACKEND-PHP.md
            **/.claude/**
            **/memory/**

          log-level: verbose
          security: loose
          timeout: 900000

      # 8. Subir .htaccess del backend (workaround para archivos con punto)
      - name: Upload backend .htaccess
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_STAGING }}
          username: ${{ secrets.FTP_USERNAME_STAGING }}
          password: ${{ secrets.FTP_PASSWORD_STAGING }}
          port: 21

          local-dir: backend-php/
          server-dir: ${{ secrets.FTP_PATH_STAGING }}backend-php/

          dangerous-clean-slate: false

          exclude: |
            **/*
            !**/.htaccess

          log-level: verbose
          security: loose
          timeout: 300000

      # 9. Subir .htaccess del frontend para /staging/ (React Router con RewriteBase /staging/)
      - name: Upload frontend .htaccess (React Router /staging/)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER_STAGING }}
          username: ${{ secrets.FTP_USERNAME_STAGING }}
          password: ${{ secrets.FTP_PASSWORD_STAGING }}
          port: 21

          local-dir: frontend-htaccess-staging/
          server-dir: ${{ secrets.FTP_PATH_STAGING }}

          dangerous-clean-slate: false

          exclude: |
            **/*
            !**/.htaccess

          log-level: verbose
          security: loose
          timeout: 300000

      # 10. Notificacion de exito
      - name: Deploy staging completado
        if: success()
        run: |
          echo "Deploy exitoso a staging"
          echo "URL: https://saggarage.com.mx/staging/"
          echo "Fecha: $(date)"

      # 11. Notificacion de error
      - name: Deploy staging fallo
        if: failure()
        run: |
          echo "Hubo un error en el deploy a staging"
          echo "Revisa los logs arriba para mas detalles"
