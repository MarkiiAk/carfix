name: Deploy to Demo

# Se ejecuta en push a la rama demo o manualmente
on:
  push:
    branches:
      - demo
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build proyecto React (base /demo/)
        run: npm run build
        env:
          NODE_ENV: production
          VITE_BASE_PATH: /demo/
          VITE_API_URL: https://saggarage.com.mx/demo/backend-php
          VITE_APP_NAME: Taller Demo
          VITE_THEME: demo
          VITE_LOGO_PATH: logo-demo.svg

      - name: Verificar build
        run: |
          if [ ! -d "dist" ]; then
            echo "Error: La carpeta dist no se genero"
            exit 1
          fi
          echo "Build generado correctamente"
          ls -la dist/

      - name: Deploy aplicacion React a /demo/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}

          local-dir: dist/
          server-dir: ./demo/

          dangerous-clean-slate: false

          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.vscode/**
            **/.DS_Store
            **/backend-php/**
            **/.claude/**
            **/memory/**

          security: strict
          timeout: 600000

      - name: Deploy Backend PHP a /demo/backend-php/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}

          local-dir: backend-php/
          server-dir: ./demo/backend-php/

          dangerous-clean-slate: false

          exclude: |
            **/.git
            **/.github/**
            **/.gitignore
            **/node_modules/**
            **/.vscode/**
            **/.DS_Store
            **/.env
            **/.env.local
            **/.env.example
            **/INSTALACION-BACKEND-PHP.md
            **/.claude/**
            **/memory/**

          log-level: verbose
          security: loose
          timeout: 900000

      - name: Upload backend .htaccess
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}

          local-dir: backend-php/
          server-dir: ./demo/backend-php/

          dangerous-clean-slate: false

          exclude: |
            **/*
            !**/.htaccess

          log-level: verbose
          security: loose
          timeout: 300000

      - name: Upload frontend .htaccess (React Router /demo/)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}

          local-dir: frontend-htaccess-demo/
          server-dir: ./demo/

          dangerous-clean-slate: false

          exclude: |
            **/*
            !**/.htaccess

          log-level: verbose
          security: loose
          timeout: 300000

      - name: Deploy demo completado
        if: success()
        run: |
          echo "Deploy exitoso a demo"
          echo "URL: https://saggarage.com.mx/demo/"
          echo "Fecha: $(date)"

      - name: Deploy demo fallo
        if: failure()
        run: |
          echo "Hubo un error en el deploy a demo"
          echo "Revisa los logs arriba para mas detalles"
